services:
  # ----------------------------------------
  # SERVICIO 1: BASE DE DATOS POSTGRESQL
  # ----------------------------------------
  db:
    image: postgres:16-alpine
    container_name: pawsity-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pawsity
      POSTGRES_USER: pawsity
      POSTGRES_PASSWORD: pawsity123
    ports:
      - "5432:5432"
    volumes:
      - pawsity_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pawsity -d pawsity"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # SERVICIO 2: ADMINER (Gestor Web de BD)
  # ----------------------------------------
  adminer:
    image: adminer:latest
    container_name: pawsity-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pawsity_pgdata: