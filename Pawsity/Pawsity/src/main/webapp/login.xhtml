<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <!-- ¡Conserva aquí los links de fuentes y el tailwind-config del HTML de Stitch! -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
</h:head>
<h:body styleClass="bg-surface-container-low min-h-screen flex items-center justify-center p-4">
    <!-- Componente obligatorio para recibir las alertas en lugar de println -->
    <p:growl id="mensajes" showDetail="true" life="4000"/>

    <main class="w-full max-w-[420px] bg-white rounded-xl shadow-lg p-8 flex flex-col border border-outline-variant/30">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-[#00685f]">🐾 PawSity Central</h1>
            <p class="text-gray-600">Gestión Integral de Refugio</p>
        </header>

        <!-- REEMPLAZO DE FORMULARIO ESTÁTICO POR JSF -->
        <h:form id="loginForm" styleClass="flex flex-col gap-6">
            <div class="flex flex-col gap-2">
                <label class="text-sm font-medium">Correo Electrónico</label>
                <p:inputText value="#{loginBean.correo}" required="true"
                             requiredMessage="El correo es obligatorio"
                             styleClass="w-full p-3 border rounded-lg outline-none focus:border-[#00685f]"
                             placeholder="admin@mail.com"/>
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-sm font-medium">Contraseña</label>
                <p:password value="#{loginBean.contrasena}" required="true"
                            requiredMessage="La contraseña es obligatoria"
                            styleClass="w-full p-3 border rounded-lg outline-none focus:border-[#00685f]"
                            feedback="false" placeholder="••••••••"/>
            </div>

            <!-- Botón conectado al método login() -->
            <p:commandButton value="Iniciar Sesión" action="#{loginBean.login()}"
                             update="loginForm :mensajes"
                             styleClass="w-full py-3 bg-[#00685f] text-white font-medium rounded-lg hover:bg-[#008378] transition-all cursor-pointer"/>
        </h:form>
    </main>
</h:body>
</html>
